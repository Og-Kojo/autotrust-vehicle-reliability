<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="580" fill="#F8FAFB" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">AutoTrust — Vehicle Reliability Intelligence Platform</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">End-to-end data pipeline · Microsoft Fabric · PySpark · Delta Lake · Power BI</text>

  <!-- ── DATA SOURCES ── -->
  <rect x="30" y="90" width="160" height="30" rx="6" fill="#1A1A2E"/>
  <text x="110" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Data Sources</text>

  <!-- NHTSA -->
  <rect x="30" y="132" width="160" height="60" rx="8" fill="white" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="110" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">NHTSA API</text>
  <text x="110" y="173" text-anchor="middle" font-size="10" fill="#666">Complaints · Recalls</text>
  <text x="110" y="185" text-anchor="middle" font-size="10" fill="#666">Live API call</text>

  <!-- Kaggle -->
  <rect x="30" y="206" width="160" height="60" rx="8" fill="white" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="110" y="231" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Kaggle Dataset</text>
  <text x="110" y="247" text-anchor="middle" font-size="10" fill="#666">Vehicle reliability</text>
  <text x="110" y="259" text-anchor="middle" font-size="10" fill="#666">survey data</text>

  <!-- RepairPal -->
  <rect x="30" y="280" width="160" height="60" rx="8" fill="white" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="110" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">RepairPal</text>
  <text x="110" y="321" text-anchor="middle" font-size="10" fill="#666">Maintenance costs</text>
  <text x="110" y="333" text-anchor="middle" font-size="10" fill="#666">Excel file</text>

  <!-- Arrows to Bronze -->
  <line x1="192" y1="162" x2="238" y2="200" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="192" y1="236" x2="238" y2="236" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="192" y1="310" x2="238" y2="272" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ── BRONZE ── -->
  <rect x="240" y="90" width="150" height="30" rx="6" fill="#CD7F32"/>
  <text x="315" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Bronze Layer</text>

  <rect x="240" y="132" width="150" height="200" rx="8" fill="white" stroke="#CD7F32" stroke-width="1.5"/>
  <text x="315" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#7A4C00">Raw ingestion</text>
  <line x1="252" y1="165" x2="378" y2="165" stroke="#F0E0C0" stroke-width="0.8"/>
  <text x="315" y="183" text-anchor="middle" font-size="10" fill="#555">complaints</text>
  <text x="315" y="200" text-anchor="middle" font-size="10" fill="#555">recalls</text>
  <text x="315" y="217" text-anchor="middle" font-size="10" fill="#555">maintenance_data</text>
  <text x="315" y="234" text-anchor="middle" font-size="10" fill="#555">vehicle_images</text>
  <text x="315" y="251" text-anchor="middle" font-size="10" fill="#555">logos</text>
  <line x1="252" y1="262" x2="378" y2="262" stroke="#F0E0C0" stroke-width="0.8"/>
  <text x="315" y="279" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Standardise +</text>
  <text x="315" y="294" text-anchor="middle" font-size="10" fill="#888" font-style="italic">quality checks</text>
  <text x="315" y="309" text-anchor="middle" font-size="10" fill="#888" font-style="italic">2 notebooks</text>

