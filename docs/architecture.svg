  <text x="314" y="484" text-anchor="middle" font-size="9" fill="#666">Image · scores · verdict</text>
  <text x="314" y="496" text-anchor="middle" font-size="9" fill="#666">Similar vehicles</text>

  <rect x="398" y="432" width="148" height="70" rx="8" fill="white" stroke="#F2C811" stroke-width="1.5"/>
  <text x="472" y="454" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6200">Brand Reliability</text>
  <text x="472" y="470" text-anchor="middle" font-size="9" fill="#666">Bar chart · radar</text>
  <text x="472" y="484" text-anchor="middle" font-size="9" fill="#666">Treemap · brand table</text>
  <text x="472" y="496" text-anchor="middle" font-size="9" fill="#666">13 brands compared</text>

  <rect x="556" y="432" width="148" height="70" rx="8" fill="white" stroke="#F2C811" stroke-width="1.5"/>
  <text x="630" y="454" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6200">Model Ranking</text>
  <text x="630" y="470" text-anchor="middle" font-size="9" fill="#666">Scatter · top 10 table</text>
  <text x="630" y="484" text-anchor="middle" font-size="9" fill="#666">Score trend line</text>
  <text x="630" y="496" text-anchor="middle" font-size="9" fill="#666">442 models scored</text>

  <rect x="714" y="432" width="156" height="70" rx="8" fill="white" stroke="#F2C811" stroke-width="1.5"/>
  <text x="792" y="454" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6200">Failure Analysis</text>
  <text x="792" y="470" text-anchor="middle" font-size="9" fill="#666">Heatmap · donut</text>
  <text x="792" y="484" text-anchor="middle" font-size="9" fill="#666">Brand × component</text>
  <text x="792" y="496" text-anchor="middle" font-size="9" fill="#666">11 failure categories</text>

  <!-- Arrow Gold to Power BI -->
  <line x1="745" y1="334" x2="745" y2="388" stroke="#F2C811" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="760" y="368" font-size="9" fill="#888">Direct Lake</text>

  <!-- ── PIPELINE ── -->
  <rect x="30" y="390" width="190" height="112" rx="8" fill="white" stroke="#7F77DD" stroke-width="1.5"/>
  <rect x="30" y="390" width="190" height="28" rx="8" fill="#7F77DD"/>
  <rect x="30" y="406" width="190" height="12" rx="0" fill="#7F77DD"/>
  <text x="125" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Fabric Data Pipeline</text>
  <text x="125" y="428" text-anchor="middle" font-size="10" fill="#3C3489">AutoTrust_Daily_Pipeline</text>
  <text x="125" y="446" text-anchor="middle" font-size="9" fill="#666">Schedule: Daily 00:00 UTC</text>
  <text x="125" y="462" text-anchor="middle" font-size="9" fill="#666">Bronze Ingestion → Bronze</text>
  <text x="125" y="478" text-anchor="middle" font-size="9" fill="#666">→ Silver → Gold → Monitor</text>
  <text x="125" y="494" text-anchor="middle" font-size="9" fill="#555">pipeline_run_log tracking</text>

  <!-- Arrow Pipeline to Bronze -->
  <line x1="220" y1="446" x2="238" y2="236" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>

  <!-- ── TECH STACK FOOTER ── -->
  <rect x="30" y="528" width="840" height="36" rx="6" fill="#1A1A2E"/>
  <text x="450" y="550" text-anchor="middle" font-size="11" fill="white">Microsoft Fabric · Apache Spark · PySpark · Delta Lake · Power BI DAX · NHTSA API · Python · GitHub</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F2C811" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
    </marker>
  </defs>

</svg>
