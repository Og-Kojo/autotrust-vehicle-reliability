  <text x="686" y="258" text-anchor="middle" font-size="9" fill="#888">13 brands</text>

  <rect x="750" y="218" width="108" height="42" rx="6" fill="#F0F8FF" stroke="#378ADD" stroke-width="1"/>
  <text x="804" y="234" text-anchor="middle" font-size="9" font-weight="bold" fill="#185FA5">DIM</text>
  <text x="804" y="247" text-anchor="middle" font-size="9" fill="#555">dim_vehicle</text>
  <text x="804" y="258" text-anchor="middle" font-size="9" fill="#888">77 vehicles</text>

  <rect x="632" y="272" width="108" height="42" rx="6" fill="#F0F8FF" stroke="#378ADD" stroke-width="1"/>
  <text x="686" y="288" text-anchor="middle" font-size="9" font-weight="bold" fill="#185FA5">DIM</text>
  <text x="686" y="301" text-anchor="middle" font-size="9" fill="#555">dim_failure_cat</text>
  <text x="686" y="312" text-anchor="middle" font-size="9" fill="#888">11 categories</text>

  <rect x="750" y="272" width="108" height="42" rx="6" fill="#F5F0FF" stroke="#7F77DD" stroke-width="1"/>
  <text x="804" y="288" text-anchor="middle" font-size="9" font-weight="bold" fill="#3C3489">SILVER</text>
  <text x="804" y="301" text-anchor="middle" font-size="9" fill="#555">silver_logos</text>
  <text x="804" y="312" text-anchor="middle" font-size="9" fill="#888">image URLs</text>

  <!-- Relationship lines inside Gold -->
  <line x1="745" y1="200" x2="686" y2="218" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="745" y1="200" x2="804" y2="218" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="686" y1="218" x2="686" y2="272" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="3 2"/>

