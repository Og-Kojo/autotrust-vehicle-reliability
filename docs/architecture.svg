  <rect x="680" y="148" width="130" height="52" rx="6" fill="#FFF8E7" stroke="#B8860B" stroke-width="1"/>
  <text x="745" y="167" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A5800">FACT</text>
  <text x="745" y="181" text-anchor="middle" font-size="10" fill="#555">fact_vehicle_reliability</text>
  <text x="745" y="194" text-anchor="middle" font-size="9" fill="#888">442 models · 1,314 rows</text>

  <!-- Dim tables -->
  <rect x="632" y="218" width="108" height="42" rx="6" fill="#F0F8FF" stroke="#378ADD" stroke-width="1"/>
  <text x="686" y="234" text-anchor="middle" font-size="9" font-weight="bold" fill="#185FA5">DIM</text>
