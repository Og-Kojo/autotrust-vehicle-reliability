  <text x="745" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Gold Layer — Star Schema</text>

  <rect x="620" y="132" width="250" height="200" rx="8" fill="white" stroke="#B8860B" stroke-width="1.5"/>

