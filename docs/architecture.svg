  <rect x="430" y="90" width="150" height="30" rx="6" fill="#7F7F7F"/>
  <text x="505" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Silver Layer</text>

  <rect x="430" y="132" width="150" height="200" rx="8" fill="white" stroke="#7F7F7F" stroke-width="1.5"/>
  <text x="505" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Cleaned + enriched</text>
  <line x1="442" y1="165" x2="568" y2="165" stroke="#E0E0E0" stroke-width="0.8"/>
  <text x="505" y="183" text-anchor="middle" font-size="10" fill="#555">silver_complaints</text>
  <text x="505" y="200" text-anchor="middle" font-size="10" fill="#555">silver_recalls</text>
  <text x="505" y="217" text-anchor="middle" font-size="10" fill="#555">silver_maintenance</text>
  <text x="505" y="234" text-anchor="middle" font-size="10" fill="#555">silver_logos</text>
  <text x="505" y="251" text-anchor="middle" font-size="10" fill="#555">silver_vehicle_images</text>
  <line x1="442" y1="262" x2="568" y2="262" stroke="#E0E0E0" stroke-width="0.8"/>
  <text x="505" y="279" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Normalise · join ·</text>
  <text x="505" y="294" text-anchor="middle" font-size="10" fill="#888" font-style="italic">validate schema</text>
  <text x="505" y="309" text-anchor="middle" font-size="10" fill="#888" font-style="italic">1 notebook</text>

  <!-- Arrow Silver to Gold -->
  <line x1="582" y1="236" x2="618" y2="236" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <text x="600" y="228" text-anchor="middle" font-size="9" fill="#888">Delta</text>

